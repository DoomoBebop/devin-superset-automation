version: "3.9"

services:
  automation:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DEVIN_API_KEY=${DEVIN_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-DoomoBebop/superset-interview}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - METRICS_PATH=/app/data/devin_metrics.json
      - PORT=8080
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Optional: run batch mode instead of webhook server
  batch:
    build: .
    command: python src/orchestrator.py --label security
    environment:
      - DEVIN_API_KEY=${DEVIN_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-DoomoBebop/superset-interview}
      - METRICS_PATH=/app/data/devin_metrics.json
    volumes:
      - ./data:/app/data
    profiles:
      - batch
